spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: orders-service
              uri: lb://ORDERS-SERVICE
              predicates:
                - Path=/orders/**
            - id: inventory-service
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/inventory/**
logging:
  level:
    org.springframework.cloud.gateway: DEBUG