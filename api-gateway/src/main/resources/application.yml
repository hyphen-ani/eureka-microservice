spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: orders-service
              uri: lb://ORDERS-SERVICE
              predicates:
                - Path=/api/v1/orders/**
              filters:
                - StripPrefix=2
            - id: inventory-service
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/api/v1/inventory/**
              filters:
                - StripPrefix=2
                - AddRequestHeader=X-Custom-Header, Inventory
logging:
  level:
    org.springframework.cloud.gateway: DEBUG